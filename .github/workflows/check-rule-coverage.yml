# Rule-coverage CI gate (Paper A §2.4 / §4.3).
#
# Enforces one direction of bidirectional traceability between the safety
# rules registered in scripts/check-rule-coverage.ts (REQUIRED_RULES) and
# the behavioral assertions in scripts/scenarios/. The check is partial
# (one-directional) and limited (no semantic adequacy) — see Paper A §2.4
# and §5 limitations.
#
# This workflow does NOT implement the dead-man-switch heartbeat (§2.3) —
# that is an external scheduler (cron-job.org) hitting /api/admin/heartbeat
# directly. GitHub Actions auto-disables scheduled workflows after 60 days
# of repo inactivity, which would defeat a dead-man-switch by design.
# The dead-man switch's external infrastructure choice is documented in
# Paper A §2.3.
name: Rule Coverage CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-rule-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run rule-coverage check
        run: npm run check-rule-coverage
